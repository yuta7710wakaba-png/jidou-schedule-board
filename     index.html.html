<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data:; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data:; connect-src 'none'; font-src 'self'; object-src 'none'; media-src 'self'; frame-src 'none'; worker-src 'none'; manifest-src 'self'; base-uri 'none'; form-action 'none'">
  <title>活動きりかえボード</title>
  <style>
:root{
  --bg:#edf5f8;--panel:#fff;--text:#24333c;--muted:#6a7c86;--line:#d6e3e9;
  --blue:#328bc5;--blue-soft:#dff2ff;--orange:#f2a63b;--orange-soft:#fff2d9;
  --personal:#7b65c7;--personal-soft:#eee9ff;--shadow:0 1.2vw 2.5vw rgba(35,65,82,.12)
}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic","Hiragino Kaku Gothic ProN",sans-serif;background:#1d2a31;color:var(--text)}
button,input,select{font:inherit}button{cursor:pointer}.app{width:100vw;height:100vh;padding:1.1vw;background:var(--bg);display:grid;grid-template-rows:auto 1fr;gap:.8vw}
.topbar{height:9.2vh;display:flex;justify-content:space-between;align-items:center;padding:0 1.1vw;background:var(--panel);border:.14vw solid var(--line);border-radius:1.3vw;box-shadow:var(--shadow)}
.date{font-size:1.15vw;color:var(--muted);font-weight:700}.clock{font-size:2.9vw;line-height:1;font-weight:900;letter-spacing:.05em}.top-actions{display:flex;align-items:center;gap:.7vw}
.pill-button,.icon-button{border:0;border-radius:1vw;background:var(--blue-soft);color:#174b69;font-weight:800}.pill-button{padding:.75vw 1.1vw;font-size:1.05vw}.sound-off{background:#f2f4f5;color:#53636b}.icon-button{width:3.7vw;height:3.7vw;font-size:1.8vw}
.board{display:grid;grid-template-columns:minmax(0,2fr) minmax(390px,1fr);gap:.8vw;min-height:0}.current-card,.countdown-card,.next-card,.personal-timer-card,.control-card{background:var(--panel);border:.14vw solid var(--line);border-radius:1.45vw;box-shadow:var(--shadow)}
.current-card{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.2vw;position:relative;overflow:hidden}.current-card:before{content:"";position:absolute;width:39vw;height:39vw;border-radius:50%;background:var(--blue-soft);opacity:.62;z-index:0}.current-card>*{position:relative;z-index:1}.section-label{font-size:1.45vw;font-weight:900;color:var(--blue);letter-spacing:.12em}
.activity-image-wrap{width:min(39vw,59vh);height:min(31vw,49vh);margin:.5vh 0;display:flex;align-items:center;justify-content:center}.activity-image{max-width:100%;max-height:100%;object-fit:contain;border-radius:1.4vw;box-shadow:0 .6vw 1.5vw rgba(25,36,42,.15)}
.current-name{font-size:4.3vw;margin:.1vh 0;font-weight:900;letter-spacing:.06em}.status-message{font-size:1.4vw;color:var(--muted);font-weight:700;margin:.3vh 0}
.side-panel{display:grid;grid-template-rows:minmax(0,1.15fr) minmax(0,.56fr) minmax(0,.94fr) auto;gap:.7vw;min-height:0}.countdown-card{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.55vw}.countdown-title{font-size:1.15vw;font-weight:900;color:var(--muted);margin-bottom:.1vh}.timer-shell{position:relative;aspect-ratio:1}.main-timer-shell{width:min(15.3vw,24.5vh)}.timer-svg{width:100%;height:100%;transform:rotate(-90deg)}.timer-track,.timer-progress,.personal-track,.personal-progress{fill:none;stroke-width:11}.timer-track{stroke:#e7eef1}.timer-progress{stroke:var(--orange);stroke-linecap:round;transition:stroke-dashoffset .5s linear}.timer-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}.timer-text{font-size:2.35vw;font-weight:900}.timer-subtext{font-size:.9vw;color:var(--muted);font-weight:800}.waiting .timer-progress{stroke:#b9cbd3}.active-warning{background:var(--orange-soft);border-color:#f5c470}.active-warning .countdown-title,.active-warning .timer-text{color:#9b650e}
.next-card{padding:.7vw 1vw;display:flex;flex-direction:column;justify-content:center}.next-row{display:flex;align-items:center;gap:.75vw;margin-top:.2vh}.next-image{width:6.3vw;height:5.5vw;border-radius:.9vw;object-fit:cover;background:#f2f7fa}.next-name{font-size:1.85vw;font-weight:900}.next-time{font-size:1.1vw;color:var(--muted);font-weight:800;margin-top:.15vh}
.personal-timer-card{padding:.65vw .8vw;background:var(--personal-soft);border-color:#c9bdf6}.personal-head{display:grid;grid-template-columns:1fr auto;align-items:center;gap:.6vw}.personal-label{font-size:1.05vw;font-weight:900;color:#5b47a8}.personal-label-input{width:100%;margin-top:.2vw;padding:.35vw .55vw;border:1px solid #b7a9ec;border-radius:.65vw;background:#fff;font-size:1.25vw;font-weight:900;color:#433773}.personal-timer-shell{position:relative;width:min(7.2vw,11.7vh);aspect-ratio:1}.personal-track{stroke:#d7cff8}.personal-progress{stroke:var(--personal);stroke-linecap:round;transition:stroke-dashoffset .25s linear}.personal-timer-text{font-size:1.25vw;font-weight:900;color:#51409a}.personal-timer-subtext{font-size:.72vw;color:#7165a6;font-weight:800}.personal-presets,.personal-actions{display:grid;gap:.35vw;margin-top:.35vw}.personal-presets{grid-template-columns:repeat(4,1fr)}.personal-actions{grid-template-columns:1.25fr 1fr}.personal-presets button,.personal-actions button{border:0;border-radius:.65vw;padding:.38vw .3vw;font-size:.85vw;font-weight:900;background:#fff;color:#5b4a9c}.personal-presets button.selected{background:var(--personal);color:#fff}.personal-actions .personal-start{background:var(--personal);color:#fff}.personal-timer-card.finished{animation:personalPulse .7s infinite alternate}@keyframes personalPulse{from{box-shadow:0 0 0 rgba(123,101,199,0)}to{box-shadow:0 0 2.3vw rgba(123,101,199,.7)}}
.control-card{padding:.55vw;display:grid;grid-template-columns:1fr 1fr;gap:.5vw}.control-button{border:0;border-radius:.8vw;padding:.75vw;font-size:.9vw;font-weight:900;background:#edf2f4;color:#40545e}.control-button.primary{background:var(--blue);color:#fff}
.transition-overlay{position:fixed;inset:0;background:rgba(237,245,248,.98);z-index:20}.overlay-inner{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}.overlay-title{font-size:4vw;font-weight:900;color:var(--orange);animation:pulse 1s infinite alternate}.overlay-image{width:min(47vw,64vh);height:min(36vw,50vh);object-fit:contain;border-radius:1.8vw;box-shadow:0 1vw 2vw rgba(0,0,0,.15);margin:1vh}.overlay-name{font-size:5.2vw;font-weight:900}@keyframes pulse{from{transform:scale(.96)}to{transform:scale(1.04)}}
.personal-overlay{position:fixed;inset:0;background:rgba(238,233,255,.97);z-index:25}.personal-overlay-inner{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}.personal-overlay-title{font-size:5vw;font-weight:900;color:var(--personal)}.personal-overlay-name{font-size:8vw;font-weight:900;color:#433773;margin:2vh}.personal-overlay button{border:0;border-radius:1vw;padding:1vw 3vw;background:var(--personal);color:#fff;font-size:1.4vw;font-weight:900}
.settings-dialog{width:min(620px,90vw);border:0;border-radius:24px;padding:0;box-shadow:0 20px 60px rgba(0,0,0,.28)}.settings-dialog::backdrop{background:rgba(18,31,38,.62)}.settings-dialog form{padding:24px;display:grid;gap:16px}.dialog-header{display:flex;justify-content:space-between;align-items:center}.dialog-header h2{margin:0;font-size:28px}.close-button{border:0;background:#eef2f4;border-radius:50%;width:40px;height:40px;font-size:26px}.settings-dialog label{display:grid;gap:7px;font-weight:800;color:#42545d}.settings-dialog select,.settings-dialog input[type=time]{width:100%;border:1px solid #cbd9df;border-radius:12px;padding:12px;background:#fff}.settings-dialog input[type=range]{width:100%}.preview-buttons,.dialog-actions{display:flex;gap:10px}.preview-buttons button,.dialog-actions button{flex:1;border:0;border-radius:12px;padding:13px;font-weight:900}.preview-buttons button,.secondary{background:#edf2f4}.save-button{background:var(--blue);color:#fff}
@media (max-aspect-ratio:4/3){.board{grid-template-columns:1.55fr 1fr}.activity-image-wrap{width:42vw;height:38vw}.current-name{font-size:3.7vw}.next-name{font-size:1.6vw}}

</style>
</head>
<body>
  <main class="app" id="app">
    <header class="topbar">
      <div><div id="date" class="date"></div><div id="clock" class="clock">--:--</div></div>
      <div class="top-actions">
        <button id="soundButton" class="pill-button sound-off" type="button">🔇 音を有効にする</button>
        <button id="fullscreenButton" class="icon-button" type="button" aria-label="全画面表示">⛶</button>
        <button id="settingsButton" class="icon-button" type="button" aria-label="設定を開く">⚙</button>
      </div>
    </header>

    <section class="board">
      <article class="current-card">
        <div class="section-label">いま</div>
        <div class="activity-image-wrap"><img id="currentVisual" class="activity-image" alt=""></div>
        <h1 id="currentName" class="current-name">じゆうあそび</h1>
        <p id="statusMessage" class="status-message">たのしく すごそう</p>
      </article>

      <aside class="side-panel">
        <section id="countdownCard" class="countdown-card waiting">
          <div id="countdownTitle" class="countdown-title">10分前に おしらせします</div>
          <div class="timer-shell main-timer-shell">
            <svg class="timer-svg" viewBox="0 0 140 140" aria-hidden="true">
              <circle class="timer-track" cx="70" cy="70" r="58"></circle>
              <circle id="timerProgress" class="timer-progress" cx="70" cy="70" r="58"></circle>
            </svg>
            <div class="timer-center"><div id="timerText" class="timer-text">--:--</div><div id="timerSubtext" class="timer-subtext">開始前</div></div>
          </div>
        </section>

        <section class="next-card">
          <div class="section-label">つぎ</div>
          <div class="next-row">
            <img id="nextVisual" class="next-image" alt="">
            <div><div id="nextName" class="next-name">あさ・おひるのかい</div><div id="nextTime" class="next-time">10:30から</div></div>
          </div>
        </section>

        <section id="personalTimerCard" class="personal-timer-card">
          <div class="personal-head">
            <div>
              <div class="personal-label">こべつタイマー</div>
              <input id="personalLabel" class="personal-label-input" value="トイレ" maxlength="12" aria-label="個別タイマーの目的">
            </div>
            <div class="personal-timer-shell">
              <svg class="timer-svg" viewBox="0 0 140 140" aria-hidden="true">
                <circle class="personal-track" cx="70" cy="70" r="58"></circle>
                <circle id="personalProgress" class="personal-progress" cx="70" cy="70" r="58"></circle>
              </svg>
              <div class="timer-center"><div id="personalTimerText" class="personal-timer-text">05:00</div><div id="personalTimerSubtext" class="personal-timer-subtext">あと</div></div>
            </div>
          </div>
          <div class="personal-presets">
            <button type="button" data-minutes="3">3分</button><button type="button" data-minutes="5">5分</button><button type="button" data-minutes="10">10分</button><button type="button" data-minutes="15">15分</button>
          </div>
          <div class="personal-actions">
            <button id="personalStartButton" class="personal-start" type="button">スタート</button><button id="personalResetButton" type="button">リセット</button>
          </div>
        </section>

        <section class="control-card">
          <button id="switchNowButton" class="control-button primary" type="button">今すぐ きりかえる</button>
          <button id="stopSoundButton" class="control-button" type="button">音を とめる</button>
        </section>
      </aside>
    </section>
  </main>

  <div id="transitionOverlay" class="transition-overlay" hidden><div class="overlay-inner"><div class="overlay-title">じかんです</div><img id="overlayVisual" class="overlay-image" alt=""><div id="overlayName" class="overlay-name"></div></div></div>
  <div id="personalOverlay" class="transition-overlay personal-overlay" hidden><div class="overlay-inner"><div class="overlay-title">じかんです</div><div id="personalOverlayName" class="overlay-name">トイレ</div><button id="closePersonalOverlay" class="overlay-close" type="button">とじる</button></div></div>

  <dialog id="settingsDialog" class="settings-dialog">
    <form method="dialog" id="settingsForm">
      <div class="dialog-header"><h2>表示設定</h2><button class="close-button" value="cancel" aria-label="閉じる">×</button></div>
      <label>現在の活動<select id="currentSelect"></select></label>
      <label>次の活動<select id="nextSelect"></select></label>
      <label>次の活動の開始時間<input id="nextStartTime" type="time" required></label>
      <label>予告タイマー<select id="warningMinutes"><option value="5">5分前</option><option value="10" selected>10分前</option><option value="15">15分前</option></select></label>
      <label>音量<input id="volumeRange" type="range" min="0" max="100" value="40"></label>
      <div class="preview-buttons"><button id="previewWarning" type="button">予告音を確認</button><button id="previewTransition" type="button">切替音を確認</button></div>
      <div class="dialog-actions"><button value="cancel" class="secondary">キャンセル</button><button id="saveSettings" value="default" class="save-button">設定して開始</button></div>
    </form>
  </dialog>

const storageKey="jihatsuTransitionBoardV2";
const defaultState={currentId:"free",nextId:"meeting",nextStart:"10:30",warningMinutes:10,volume:40,soundEnabled:false,warningPlayedFor:"",transitionPlayedFor:"",personalLabel:"トイレ",personalMinutes:5};
let state=loadState(),audioContext=null,activeOscillators=[],overlayTimer=null;
let personal={durationMs:state.personalMinutes*60000,remainingMs:state.personalMinutes*60000,endAt:null,running:false,finished:false};
const $=id=>document.getElementById(id),radius=58,circumference=2*Math.PI*radius;
$("timerProgress").style.strokeDasharray=String(circumference);$("personalProgress").style.strokeDasharray=String(circumference);
function loadState(){try{return {...defaultState,...JSON.parse(localStorage.getItem(storageKey)||"{}")};}catch{return {...defaultState};}}
function saveState(){localStorage.setItem(storageKey,JSON.stringify(state));}
function getActivity(id){return activities.find(a=>a.id===id)||activities[0];}
function pad(v){return String(v).padStart(2,"0");}
function todayKey(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function targetDate(){const [h,m]=state.nextStart.split(":").map(Number),d=new Date();d.setHours(h,m,0,0);return d;}
function formatRemaining(ms){const sec=Math.max(0,Math.ceil(ms/1000));return `${pad(Math.floor(sec/60))}:${pad(sec%60)}`;}
function populateSelects(){for(const id of ["currentSelect","nextSelect"]){$(id).innerHTML=activities.map(a=>`<option value="${a.id}">${a.name}</option>`).join("");}}
function setImage(el,activity){el.src=activity.image;el.alt=activity.name;}
function renderActivities(){const current=getActivity(state.currentId),next=getActivity(state.nextId);setImage($("currentVisual"),current);$("currentName").textContent=current.name;setImage($("nextVisual"),next);$("nextName").textContent=next.name;$("nextTime").textContent=`${state.nextStart}から`;$("soundButton").textContent=state.soundEnabled?"🔊 音は有効です":"🔇 音を有効にする";$("soundButton").classList.toggle("sound-off",!state.soundEnabled);}
function renderClock(){const now=new Date();$("clock").textContent=`${pad(now.getHours())}:${pad(now.getMinutes())}`;$("date").textContent=new Intl.DateTimeFormat("ja-JP",{month:"long",day:"numeric",weekday:"short"}).format(now);}
function tick(){renderClock();const now=new Date(),target=targetDate(),diff=target-now,warningMs=state.warningMinutes*60000,eventKey=`${todayKey()}_${state.nextStart}_${state.nextId}`;if(diff>warningMs){setMainTimer(circumference,"--:--","開始前",false);$("countdownTitle").textContent=`${state.warningMinutes}分前に おしらせします`;$("statusMessage").textContent="たのしく すごそう";}else if(diff>0){const ratio=Math.max(0,Math.min(1,diff/warningMs));setMainTimer(circumference*(1-ratio),formatRemaining(diff),"あと",true);$("countdownTitle").textContent="つぎの じかんまで";$("statusMessage").textContent=`あと ${Math.ceil(diff/60000)}ぷんで きりかえ`;if(state.warningPlayedFor!==eventKey){state.warningPlayedFor=eventKey;saveState();playWarning();}}else{setMainTimer(circumference,"00:00","じかんです",true);if(state.transitionPlayedFor!==eventKey){state.transitionPlayedFor=eventKey;saveState();performTransition();}}tickPersonal();}
function setMainTimer(offset,text,subtext,active){$("timerProgress").style.strokeDashoffset=String(offset);$("timerText").textContent=text;$("timerSubtext").textContent=subtext;$("countdownCard").classList.toggle("active-warning",active);$("countdownCard").classList.toggle("waiting",!active);}
async function enableSound(){audioContext||=new (window.AudioContext||window.webkitAudioContext)();await audioContext.resume();state.soundEnabled=true;saveState();renderActivities();playTone(523.25,.02,.18);}
function playTone(freq,start,duration,type="sine",gainScale=1){if(!state.soundEnabled||!audioContext)return;const osc=audioContext.createOscillator(),gain=audioContext.createGain(),at=audioContext.currentTime+start;osc.type=type;osc.frequency.value=freq;const volume=(state.volume/100)*.16*gainScale;gain.gain.setValueAtTime(.0001,at);gain.gain.exponentialRampToValueAtTime(Math.max(.0002,volume),at+.025);gain.gain.exponentialRampToValueAtTime(.0001,at+duration);osc.connect(gain).connect(audioContext.destination);osc.start(at);osc.stop(at+duration+.03);activeOscillators.push(osc);osc.onended=()=>activeOscillators=activeOscillators.filter(o=>o!==osc);}
function playWarning(){playTone(659.25,0,.3,"sine",.8);playTone(783.99,.34,.45,"sine",.8);}
function playTransitionMusic(){[523.25,659.25,783.99,1046.5,783.99,659.25,698.46,880,1046.5].forEach((n,i)=>playTone(n,i*.28,.38,i%3===0?"triangle":"sine",.75));}
function playPersonalFinish(){[659.25,783.99,987.77].forEach((n,i)=>playTone(n,i*.25,.42,"sine",.85));}
function stopSound(){for(const osc of activeOscillators){try{osc.stop();}catch{}}activeOscillators=[];}
function performTransition(){playTransitionMusic();const next=getActivity(state.nextId);setImage($("overlayVisual"),next);$("overlayName").textContent=next.name;$("transitionOverlay").hidden=false;clearTimeout(overlayTimer);overlayTimer=setTimeout(()=>{$("transitionOverlay").hidden=true;state.currentId=state.nextId;saveState();renderActivities();$("statusMessage").textContent="はじめよう";},6500);}
function openSettings(){$("currentSelect").value=state.currentId;$("nextSelect").value=state.nextId;$("nextStartTime").value=state.nextStart;$("warningMinutes").value=String(state.warningMinutes);$("volumeRange").value=String(state.volume);$("settingsDialog").showModal();}
function applySettings(){state.currentId=$("currentSelect").value;state.nextId=$("nextSelect").value;state.nextStart=$("nextStartTime").value;state.warningMinutes=Number($("warningMinutes").value);state.volume=Number($("volumeRange").value);state.warningPlayedFor="";state.transitionPlayedFor="";saveState();renderActivities();tick();}
function setPersonalMinutes(minutes){state.personalMinutes=minutes;personal.durationMs=minutes*60000;personal.remainingMs=personal.durationMs;personal.endAt=null;personal.running=false;personal.finished=false;saveState();document.querySelectorAll("[data-minutes]").forEach(b=>b.classList.toggle("selected",Number(b.dataset.minutes)===minutes));$("personalStartButton").textContent="スタート";$("personalTimerCard").classList.remove("finished");renderPersonal();}
function startPausePersonal(){if(personal.finished){setPersonalMinutes(state.personalMinutes);}if(personal.running){personal.remainingMs=Math.max(0,personal.endAt-Date.now());personal.running=false;personal.endAt=null;$("personalStartButton").textContent="つづける";}else{personal.endAt=Date.now()+personal.remainingMs;personal.running=true;$("personalStartButton").textContent="いったん とめる";}renderPersonal();}
function resetPersonal(){setPersonalMinutes(state.personalMinutes);}
function tickPersonal(){if(personal.running){personal.remainingMs=Math.max(0,personal.endAt-Date.now());if(personal.remainingMs<=0){personal.running=false;personal.finished=true;$("personalStartButton").textContent="もういちど";$("personalTimerCard").classList.add("finished");$("personalOverlayName").textContent=state.personalLabel||"じかん";$("personalOverlay").hidden=false;playPersonalFinish();}}renderPersonal();}
function renderPersonal(){const ratio=personal.durationMs?Math.max(0,Math.min(1,personal.remainingMs/personal.durationMs)):0;$("personalProgress").style.strokeDashoffset=String(circumference*(1-ratio));$("personalTimerText").textContent=formatRemaining(personal.remainingMs);$("personalTimerSubtext").textContent=personal.finished?"じかんです":"あと";}
populateSelects();renderActivities();$("personalLabel").value=state.personalLabel;setPersonalMinutes(state.personalMinutes);tick();setInterval(tick,500);
$("soundButton").addEventListener("click",enableSound);$("settingsButton").addEventListener("click",openSettings);$("saveSettings").addEventListener("click",applySettings);$("previewWarning").addEventListener("click",async()=>{if(!state.soundEnabled)await enableSound();state.volume=Number($("volumeRange").value);playWarning();});$("previewTransition").addEventListener("click",async()=>{if(!state.soundEnabled)await enableSound();state.volume=Number($("volumeRange").value);playTransitionMusic();});$("stopSoundButton").addEventListener("click",stopSound);$("switchNowButton").addEventListener("click",performTransition);$("fullscreenButton").addEventListener("click",()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen());
document.querySelectorAll("[data-minutes]").forEach(b=>b.addEventListener("click",()=>setPersonalMinutes(Number(b.dataset.minutes))));$("personalStartButton").addEventListener("click",startPausePersonal);$("personalResetButton").addEventListener("click",resetPersonal);$("personalLabel").addEventListener("input",()=>{state.personalLabel=$("personalLabel").value.trim()||"じかん";saveState();});$("closePersonalOverlay").addEventListener("click",()=>{$("personalOverlay").hidden=true;$("personalTimerCard").classList.remove("finished");});window.addEventListener("focus",tick);document.addEventListener("visibilitychange",()=>{if(!document.hidden)tick();});

</script>
</body>
</html>
