<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#d9f2fb">
  <title>かつどう きりかえボード V5</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell" aria-label="活動きりかえボード">
    <header class="topbar">
      <div class="clock-wrap" aria-label="現在日時"><span class="clock-icon">🕘</span><div class="clock-text"><span id="dateText" class="date-text">--月--日</span><time id="clock">--:--</time></div></div>
      <div class="top-actions">
        <button id="voiceBtn" class="icon-button" type="button" aria-label="音声読み上げ">🔊<span>おんせい</span></button>
        <button id="fullscreenBtn" class="icon-button" type="button" aria-label="全画面表示">⛶<span>ぜんがめん</span></button>
        <button id="settingsBtn" class="icon-button" type="button" aria-label="設定を開く">⚙<span>せってい</span></button>
      </div>
    </header>

    <section class="board-grid">
      <article class="panel current-panel">
        <div class="panel-title-row">
          <h1>いまのかつどう</h1>
          <span id="currentPosition" class="position-badge">1 / 8</span>
        </div>
        <div class="current-content">
          <div class="activity-visual">
            <img id="currentImage" src="meeting.webp" alt="現在の活動">
          </div>
          <div class="activity-info">
            <p id="currentName" class="activity-name">あさのかい</p>
            <div class="timer-card timer-card-large">
              <div id="currentRing" class="timer-ring" style="--progress:0">
                <div class="timer-center">
                  <span id="currentTime" class="timer-time">10:00</span>
                  <small>のこり</small>
                </div>
              </div>
              <div class="timer-controls">
                <button id="currentStartBtn" class="primary-button" type="button">▶ はじめる</button>
                <button id="currentResetBtn" class="soft-button" type="button">↻ もどす</button>
              </div>
            </div>
          </div>
        </div>
      </article>

      <aside class="side-column">
        <article class="panel next-panel">
          <h2>つぎのかつどう</h2>
          <div class="next-content">
            <div class="next-visual"><img id="nextImage" src="washroom.webp" alt="次の活動"></div>
            <div class="next-info">
              <p id="nextName" class="next-name">トイレ</p>
              <div class="mini-timer-wrap">
                <div id="nextRing" class="timer-ring timer-ring-small" style="--progress:0">
                  <div class="timer-center"><span id="nextTime" class="timer-time">05:00</span><small>めやす</small></div>
                </div>
              </div>
            </div>
          </div>
        </article>

        <article class="panel personal-panel">
          <h2>こべつタイマー</h2>
          <div class="personal-content">
            <div id="personalRing" class="timer-ring personal-ring" style="--progress:0">
              <div class="timer-center"><span id="personalTime" class="timer-time">05:00</span><small>のこり</small></div>
            </div>
            <div class="personal-controls">
              <div class="quick-times" aria-label="時間を選ぶ">
                <button type="button" data-minutes="1">1ぷん</button>
                <button type="button" data-minutes="3">3ぷん</button>
                <button type="button" data-minutes="5" class="selected">5ぷん</button>
                <button type="button" data-minutes="10">10ぷん</button>
              </div>
              <button id="personalStartBtn" class="primary-button" type="button">▶ はじめる</button>
              <button id="personalResetBtn" class="soft-button" type="button">↻ もどす</button>
            </div>
          </div>
        </article>
      </aside>
    </section>
  </main>

  <dialog id="settingsDialog" class="settings-dialog">
    <form method="dialog" class="settings-card">
      <header class="settings-header">
        <div><p class="eyebrow">V5</p><h2>せってい</h2></div>
        <button class="close-button" value="close" aria-label="閉じる">×</button>
      </header>

      <section class="settings-section">
        <div class="section-heading"><h3>きょうの じゅんばん</h3><p>↑ ↓ でならびかえ</p></div>
        <div id="scheduleEditor" class="schedule-editor"></div>
      </section>

      <section class="settings-section settings-options">
        <label class="switch-row"><span>じどうで よみあげる</span><input id="autoVoiceToggle" type="checkbox"><span class="switch"></span></label>
        <label class="switch-row"><span>じかんがきたら つぎへ</span><input id="autoAdvanceToggle" type="checkbox"><span class="switch"></span></label>
      </section>

      <section class="settings-section action-grid">
        <button id="advanceBtn" type="button" class="primary-button">つぎのかつどうへ</button>
        <button id="backBtn" type="button" class="soft-button">ひとつまえへ</button>
        <button id="resetScheduleBtn" type="button" class="soft-button danger-soft">さいしょにもどる</button>
        <button id="saveSettingsBtn" type="button" class="primary-button save-button">ほぞんする</button>
      </section>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="app.js" defer></script>
</body>
</html>
