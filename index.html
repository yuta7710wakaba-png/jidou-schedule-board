<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#eef8fc">
  <title>活動きりかえボード V5</title>
  <link rel="stylesheet" href="./styles.css?v=5.0.0">
</head>
<body>
<main class="app">
  <header class="header card">
    <div class="datetime">
      <div id="date" class="date"></div>
      <div id="clock" class="clock">--:--</div>
    </div>

    <div class="actions">
      <button id="soundBtn" class="btn sound">🔇 音を有効にする</button>
      <button id="fullBtn" class="btn icon" aria-label="全画面">⛶</button>
      <button id="settingsBtn" class="btn icon" aria-label="設定">⚙</button>
    </div>
  </header>

  <section class="board">
    <article class="current card">
      <div class="bubble-label blue">いま</div>
      <h1 id="currentName" class="current-name"></h1>
      <div class="current-visual">
        <img id="currentImg" class="current-img" alt="">
      </div>
      <p id="message" class="message">たのしく すごそう</p>
    </article>

    <aside class="side">
      <section class="countdown card">
        <div class="bubble-label pink">つぎ</div>
        <div class="next-main">
          <div class="next-copy">
            <div id="nextName" class="next-name"></div>
            <div id="countTitle" class="count-title">10分前に おしらせします</div>
            <div class="main-time-row">
              <span class="clock-icon">◷</span>
              <span id="mainText" class="main-time">--:--</span>
            </div>
            <div id="mainSub" class="main-sub">開始前</div>
          </div>
          <div class="next-visual-wrap">
            <img id="nextImg" class="next-img" alt="">
            <div class="next-timer">
              <svg viewBox="0 0 140 140" aria-hidden="true">
                <circle class="track" cx="70" cy="70" r="58"/>
                <circle id="mainProgress" class="progress" cx="70" cy="70" r="58"/>
              </svg>
              <div class="next-timer-center">
                <div id="nextTimerText" class="next-timer-text">--:--</div>
                <div class="next-timer-sub">あと</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="personal card">
        <div class="personal-head">
          <div class="personal-fields">
            <div class="personal-title">こべつタイマー</div>
            <input id="personalLabel" value="トイレ" aria-label="個別タイマー名">
          </div>

          <div class="ptimer">
            <svg viewBox="0 0 140 140">
              <circle class="ptrack" cx="70" cy="70" r="58"/>
              <circle id="personalProgress" class="pprogress" cx="70" cy="70" r="58"/>
            </svg>
            <div class="timer-center">
              <div id="personalText" class="timer-text">05:00</div>
              <div class="timer-sub">あと</div>
            </div>
          </div>
        </div>

        <div class="preset">
          <button data-min="3">3分</button>
          <button data-min="5" class="active">5分</button>
          <button data-min="10">10分</button>
          <button data-min="15">15分</button>
        </div>

        <div class="pactions">
          <button id="personalStart" class="start">スタート</button>
          <button id="personalReset">リセット</button>
        </div>
      </section>

      <section class="controls">
        <button id="stopSound">音を止める</button>
        <button id="switchNow" class="primary">今すぐ切り替え</button>
      </section>
    </aside>
  </section>
</main>

<div id="transitionOverlay" class="overlay" hidden>
  <div class="overlay-panel">
    <h2>つぎの じかんです</h2>
    <img id="overlayImg" alt="">
    <strong id="overlayName"></strong>
  </div>
</div>

<div id="personalOverlay" class="poverlay" hidden>
  <div class="personal-alert">
    <h2>じかんです</h2>
    <strong id="personalOverlayName"></strong>
    <button id="closePersonal">とじる</button>
  </div>
</div>

<dialog id="settingsDialog">
  <form method="dialog">
    <div class="dhead">
      <h2>ボード設定</h2>
      <button value="cancel" aria-label="閉じる">✕</button>
    </div>

    <label>いまの活動
      <select id="currentSelect"></select>
    </label>

    <label>つぎの活動
      <select id="nextSelect"></select>
    </label>

    <label>つぎの開始時間
      <input id="nextStart" type="time">
    </label>

    <label>お知らせ開始
      <select id="warningMinutes">
        <option value="5">5分前</option>
        <option value="10">10分前</option>
        <option value="15">15分前</option>
        <option value="20">20分前</option>
      </select>
    </label>

    <label>音量
      <input id="volume" type="range" min="0" max="100">
    </label>

    <div class="dialog-actions">
      <button value="cancel">キャンセル</button>
      <button id="saveSettings" class="save" value="default">保存</button>
    </div>
  </form>
</dialog>

<script src="./app.js?v=5.0.0" defer></script>
</body>
</html>
