<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#dff4ff">
<title>活動きりかえボード V9.3.2</title>
<link rel="stylesheet" href="styles-v9.3.2.css?v=9.3.2">
</head>
<body>
<div class="app">
<header class="topbar">
  <div class="brand"><span>☁</span><div><h1>活動きりかえボード</h1><p id="todayLabel">--月--日</p></div></div>
  <div class="actions">
    <div class="clock" id="clockText">--:--</div>
    <button id="soundBtn" type="button" aria-label="音を確認">🔊</button>
    <button id="fullscreenBtn" type="button" aria-label="全画面表示">⛶</button>
    <button id="settingsBtn" type="button" aria-label="設定">⚙</button>
  </div>
</header>

<main id="board" class="board">
  <section class="card current-card">
    <div class="title"><span class="dot blue"></span><h2>いま</h2></div>
    <div class="current-body">
      <button id="currentActivityButton" class="activity-button current-activity-button" type="button" aria-label="いまの活動を変更">
        <img id="currentImg" class="current-img" alt="">
        <span class="edit-hint">変更</span>
      </button>
      <div class="current-info">
        <div id="currentName" class="current-name"></div>
        <div id="message" class="message">たのしく すごそう</div>
      </div>
    </div>
  </section>

  <section class="card next-card">
    <div class="title"><span class="dot orange"></span><h2>つぎ</h2></div>
    <div class="next-body">
      <button id="nextActivityButton" class="activity-button next-activity" type="button" aria-label="つぎの活動と時間を設定">
        <img id="nextImg" class="next-img" alt="" hidden>
        <div id="nextPlaceholder" class="next-placeholder">選択してください</div>
        <div id="nextName" class="next-name"></div>
        <span class="edit-hint">設定</span>
      </button>
      <div class="visual-timer">
        <svg viewBox="0 0 120 120" aria-hidden="true">
          <circle class="track" cx="60" cy="60" r="50"/>
          <circle id="mainProgress" class="progress" cx="60" cy="60" r="50"/>
        </svg>
        <div class="timer-center"><div id="mainText">--:--</div><small id="mainSub">開始時間</small></div>
      </div>
    </div>
    <div class="next-footer">
      <div id="countTitle" class="count-title">つぎの活動を選んでください</div>
      <button id="manualTransitionBtn" class="manual-transition" type="button" disabled>この活動に切り替える</button>
    </div>
  </section>

  <section class="card personal-card">
    <div class="title"><span class="dot purple"></span><h2>こべつタイマー</h2></div>
    <div class="personal-body">
      <div class="personal-timer">
        <svg viewBox="0 0 120 120" aria-hidden="true">
          <circle class="track" cx="60" cy="60" r="50"/>
          <circle id="personalProgress" class="personal-progress" cx="60" cy="60" r="50"/>
        </svg>
        <div id="personalText" class="personal-text">05:00</div>
      </div>
      <div class="personal-controls">
        <div class="presets">
          <button data-minutes="1" type="button">1分</button>
          <button data-minutes="3" type="button">3分</button>
          <button data-minutes="5" type="button">5分</button>
          <button data-minutes="10" type="button">10分</button>
        </div>
        <div class="controls">
          <button id="personalStart" class="primary" type="button">スタート</button>
          <button id="personalReset" type="button">リセット</button>
        </div>
      </div>
    </div>
  </section>
</main>
</div>

<div id="transitionOverlay" class="overlay" hidden>
  <div class="overlay-card">
    <div class="overlay-title">つぎの じかんです</div>
    <img id="overlayImg" alt="">
    <div id="overlayName" class="overlay-name"></div>
  </div>
</div>

<dialog id="currentDialog">
<form id="currentForm" method="dialog">
  <div class="dialog-head"><h2>いまの活動</h2><button id="closeCurrentDialog" type="button">×</button></div>
  <label>活動を選ぶ<select id="quickCurrentSelect"></select></label>
  <button class="save" type="submit">変更する</button>
</form>
</dialog>

<dialog id="nextDialog">
<form id="nextForm" method="dialog">
  <div class="dialog-head"><h2>つぎの活動</h2><button id="closeNextDialog" type="button">×</button></div>
  <label>活動を選ぶ<select id="quickNextSelect"></select></label>
  <label>開始時間（未選択でも可）<input id="quickNextStart" type="time"></label>
  <button class="save" type="submit">設定する</button>
</form>
</dialog>

<dialog id="settingsDialog">
<form id="settingsForm" method="dialog">
  <div class="dialog-head"><h2>せってい</h2><button id="closeSettings" type="button">×</button></div>
  <label>いまの活動<select id="currentSelect"></select></label>
  <label>つぎの活動<select id="nextSelect"></select></label>
  <label>つぎの開始時間（未選択でも可）<input id="nextStart" type="time"></label>
  <label>お知らせ<select id="warningMinutes"><option value="1">1分前</option><option value="3">3分前</option><option value="5">5分前</option><option value="10">10分前</option></select></label>
  <label>音量<input id="volume" type="range" min="0" max="100"></label>
  <div class="sound-test"><span>活動切り替え音</span><button id="testSound" type="button">🔊 テスト再生</button></div>
  <div class="sound-test"><span>個別アラーム音</span><button id="testPersonalSound" type="button">🔊 テスト再生</button></div>
  <button class="save" type="submit">保存する</button>
</form>
</dialog>
<script src="app-v9.3.2.js?v=9.3.2"></script>
</body>
</html>
